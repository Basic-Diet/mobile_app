name: Apply Meal Planner V3 Foundation

on:
  push:
    branches:
      - feat/meal-planner-v3-canonical-products
    paths:
      - .github/workflows/apply-meal-planner-v3-foundation.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/meal-planner-v3-canonical-products
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply source changes
        run: python .github/scripts/apply_meal_planner_v3_foundation.py

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Retrofit and JSON code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format changed Dart files
        run: dart format lib test

      - name: Commit generated foundation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Basic Diet Automation"
          git config user.email "actions@users.noreply.github.com"
          git add lib test pubspec.lock
          git commit -m "feat(meal-planner): establish canonical v3 contract foundation"
          git push origin HEAD:feat/meal-planner-v3-canonical-products
