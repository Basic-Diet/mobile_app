name: Firebase App Distribution

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

jobs:
  build-and-distribute:
    name: Build & Distribute APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload to Firebase App Distribution
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: w9jds/firebase-action@master
        with:
          args: >-
            appdistribution:distribute 
            build/app/outputs/flutter-apk/app-release.apk 
            --app ${{ env.FIREBASE_APP_ID }} 
            --groups "testers"
            --release-notes "Build ${{ github.run_number }} - Commit ${{ github.sha }}"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Build Success Notification
        if: success()
        run: |
          echo "✅ Build successful! APK uploaded to Firebase App Distribution"
          echo "📦 APK path: build/app/outputs/flutter-apk/app-release.apk"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "🔢 Build: ${{ github.run_number }}"
